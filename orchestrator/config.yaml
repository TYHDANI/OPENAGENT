# OPENAGENT Global Configuration v2.0
# Updated 2026-03-03: Enhanced 12-phase pipeline with repo integrations

pipeline:
  version: "2.0"
  total_phases: 12
  max_concurrent_projects: 20
  cron_interval_minutes: 2
  daily_cost_limit_usd: 50.00

# Phase definitions (12-phase enhanced pipeline)
phases:
  1: { name: "research", display: "Deep Research" }
  2: { name: "validation", display: "Validation" }
  3: { name: "build", display: "Build" }
  4: { name: "code_review", display: "Code Review" }
  5: { name: "quality", display: "Quality" }
  6: { name: "monetization", display: "Monetization" }
  7: { name: "appstore_prep", display: "App Store Prep" }
  8: { name: "onboarding", display: "Onboarding" }
  9: { name: "screenshots", display: "Screenshots" }
  10: { name: "promo", display: "Promo" }
  11: { name: "launch", display: "Launch" }
  12: { name: "growth", display: "Growth" }

# Model routing
models:
  validation: "haiku"
  quality: "haiku"
  appstore_prep: "haiku"
  screenshots: "haiku"
  promo: "haiku"
  growth: "haiku"
  research: "sonnet"
  build: "sonnet"
  build_review: "haiku"
  code_review: "sonnet"
  monetization: "sonnet"
  onboarding: "sonnet"
  launch: "sonnet"

brave_search:
  enabled: true
  keys:
    - "BRAVE_API_KEY_1"
    - "BRAVE_API_KEY_2"
  requests_per_research_cycle: 8

# Tool integrations
scrapling:
  enabled: true
  venv_path: "tools/scrapling/.venv"
  script: "orchestrator/scrapling_search.sh"

wshobson_agents:
  enabled: true
  path: "tools/wshobson-agents"
  script: "orchestrator/agents_plugins.sh"
  plugins_active: [frontend-mobile, security-scanning, content-marketing, code-reviewer]

moneyprinter:
  enabled: true
  path: "tools/moneyprinter"
  script: "orchestrator/auto_publish.sh"

evaluator_optimizer:
  enabled: true
  max_iterations: 5
  targeted_fix_only: true
  phases_enabled: [build, code_review, quality]

quality:
  pass_threshold: 7
  max_failures: 3
  checks: [build_check, test_check, lint_check, security_check, performance_check, ux_review, accessibility_check]

code_review:
  pass_threshold: 7
  max_critical_findings: 0
  max_high_findings: 3
  checks: [security_audit, architecture_review, feature_completeness, accessibility_audit, performance_review, storekit_review]

monetization:
  default_trial_days: 7
  default_pricing_tier: "tier_3"
  apple_commission_rate: 0.15

# App Store Submission
appstore_submission:
  enabled: true
  script: "orchestrator/appstore_submit.sh"
  setup_script: "orchestrator/setup_signing.sh"
  auto_submit_after_phase: 9   # Auto-submit after screenshots phase
  auto_testflight: true
  key_dir: "~/.appstore"
  credentials_env:
    team_id: "TEAM_ID"
    key_id: "ASC_KEY_ID"
    issuer_id: "ASC_ISSUER_ID"

paths:
  projects_dir: "projects"
  ideas_dir: "ideas"
  logs_dir: "logs"
  agents_dir: "agents"
  tools_dir: "tools"
  derived_data: "/Volumes/T7/DerivedData"
  build_output: "/Volumes/T7/OPENAGENT_builds"

logging:
  decisions_log: "logs/decisions.jsonl"
  costs_log: "logs/costs.jsonl"
  failures_log: "logs/failures.jsonl"
  launches_log: "logs/launches.jsonl"
  growth_log: "logs/growth.jsonl"

health_check:
  enabled: true
  script: "orchestrator/health_check.sh"
  run_before_cycle: true

monitor:
  enabled: true
  script: "orchestrator/pipeline_monitor.sh"

# Content Engine (Larry-style autonomous posting)
content_engine:
  enabled: true
  script: "orchestrator/content_engine.sh"
  posts_per_week_initial: 7
  posts_per_week_max: 21
  platforms: [tiktok, instagram, twitter, reddit]
  hook_formulas:
    - "third_party_conflict"   # "[Person] said [doubt] → showed them → [reaction]"
    - "before_after"           # "I used to [pain]. Then I found [app]."
    - "secret_discovery"       # "I found an app that [unexpected thing]"
  ab_testing: true
  self_learning: true
  analytics_cycle: "weekly"
  tiktok_draft_mode: true      # Human adds trending audio before publishing

# Wave AI Integration
wave_ai:
  enabled: true
  api_base: "https://api.wave.co/v1"
  key_env: "WAVE_API_KEY"
  use_for: [research_transcription, content_ideas, competitor_analysis]
